name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: wasm32v1-none

      - name: Cache cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts -> contracts/target

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli

      - name: Check Formatting
        run: cargo fmt --all --manifest-path contracts/Cargo.toml -- --check

      - name: Clippy Linter
        run: cargo clippy --all-targets --manifest-path contracts/Cargo.toml -- -D warnings
        continue-on-error: false

      - name: Run Contract Tests
        run: cargo test --workspace --manifest-path contracts/Cargo.toml

      - name: WASM Compilation Sanity Check
        run: stellar contract build
        working-directory: contracts

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Frontend Tests
        run: node --test "Level 2/tests/**/*.test.js"

  summary:
    needs: [contract-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Success Summary
        run: echo "CI completed successfully. All contract and frontend tests passed!"
